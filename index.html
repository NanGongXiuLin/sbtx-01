<div>
    <h4>
        「お金を稼げるアイドル」を夢見る、がめつい女の子。人生一発逆転の手段としてアイドルを目指している。成績が悪く自己評価が低いが、可愛い顔には自信アリ。なぜか過大評価してくる生徒会長・星南のことがちょっぴり苦手。
    </h4>
    <h4>
        梦想成为「能赚钱的偶像」的贪心女孩。她将偶像视为人生一举翻身的手段。虽然成绩不好、自我评价偏低，但对可爱的脸蛋很有自信。不知为何，对总是过高评价自己的学生会会长·星南感到有点棘手（不太擅长应对）。
    </h4>
